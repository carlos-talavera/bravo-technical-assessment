spring.application.name=bravo-credit-service
spring.config.import=optional:file:.env[.properties],optional:file:./apps/backend/.env[.properties]

# --- Servidor ---
server.port=${SERVER_PORT}

# --- Base de datos ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Redis ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# --- Webhook ---
webhook.url=${WEBHOOK_URL:}

# --- Actuator ---
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# --- Logs ---
logging.level.com.charlie2code=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=ERROR
logging.level.org.apache=ERROR
logging.level.org.springframework.boot.autoconfigure=ERROR
